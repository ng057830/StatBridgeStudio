<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <!-- Rounded Background -->
  <rect width="128" height="128" rx="28" fill="#0f172a"/>
  <!-- Statistical Grid Lines (Subtle) -->
  <line x1="24" y1="104" x2="104" y2="104" stroke="rgba(255,255,255,0.1)" stroke-width="2"/>
  <line x1="24" y1="24" x2="24" y2="104" stroke="rgba(255,255,255,0.1)" stroke-width="2"/>
  
  <!-- Bridge / Arc of Data (representing connection/bridge) -->
  <path d="M 24 88 Q 64 28 104 88" fill="none" stroke="rgba(37, 99, 235, 0.3)" stroke-width="4" stroke-dasharray="4 4"/>
  
  <!-- Regression Line -->
  <line x1="32" y1="92" x2="96" y2="36" stroke="#2563eb" stroke-width="6" stroke-linecap="round"/>
  
  <!-- Scatter Plot Points -->
  <circle cx="40" cy="80" r="7" fill="#2563eb"/>
  <circle cx="64" cy="56" r="7" fill="#b45309"/>
  <circle cx="88" cy="48" r="7" fill="#2563eb"/>
  <circle cx="50" cy="60" r="5" fill="#f43f5e" opacity="0.8"/> <!-- Outlier -->
</svg>
